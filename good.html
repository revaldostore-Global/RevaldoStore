    <title>Revaldo Store — Login</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --cyan: #00ffff; --glow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; }
        canvas#stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .box { position: absolute; width: 340px; padding: 44px 40px; background: rgba(0,0,0,0.7); border: 2px solid var(--cyan); border-radius: 12px; text-align: center; box-shadow: var(--glow); opacity: 0; pointer-events: none; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.96); transition: opacity 0.3s, transform 0.3s; }
        .box.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
        .box h1 { font-family: 'Orbitron', monospace; color: var(--cyan); font-size: 20px; letter-spacing: 4px; margin-bottom: 24px; text-shadow: var(--glow); }
        .box input { width: 100%; padding: 11px 14px; margin: 8px 0; border: 1px solid rgba(0,255,255,0.3); border-radius: 6px; background: rgba(0,255,255,0.05); color: var(--cyan); font-size: 15px; font-family: 'Rajdhani', sans-serif; outline: none; transition: border 0.2s; }
        .box input:focus { border-color: var(--cyan); }
        .box input::placeholder { color: rgba(0,255,255,0.4); }
        .box button.main-btn { width: 100%; padding: 11px; margin-top: 12px; border: none; border-radius: 6px; background: var(--cyan); color: #000; font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
        .box button.main-btn:hover { box-shadow: var(--glow); transform: translateY(-1px); }
        .box button.main-btn:disabled { background: #005f6b; cursor: not-allowed; transform: none; box-shadow: none; }
        .box button.switch-btn { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid rgba(0,255,255,0.2); border-radius: 6px; background: transparent; color: rgba(0,255,255,0.6); font-family: 'Rajdhani', sans-serif; font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        .box button.switch-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        .msg { padding: 8px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; display: none; }
        .msg.success { background: rgba(0,255,100,0.1); color: #00ff88; display: block; }
        .msg.error { background: rgba(255,0,0,0.1); color: #ff6b6b; display: block; }
    </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">

    <!-- Signup -->
    <div class="box active" id="signupBox">
        <h1>SIGN UP</h1>
        <div class="msg" id="signupMsg"></div>
        <form id="signupForm">
            <input type="email"    id="gmail"       placeholder="Email"    required>
            <input type="text"     id="newUsername" placeholder="Username" required>
            <input type="password" id="newPassword" placeholder="Password (min 6 chars)" required minlength="6">
            <button type="submit" class="main-btn" id="signupBtn">CREATE ACCOUNT</button>
        </form>
        <button class="switch-btn" id="toLogin">Already have an account? Login</button>
    </div>

    <!-- Login -->
    <div class="box" id="loginBox">
        <h1>LOGIN</h1>
        <div class="msg" id="loginMsg"></div>
        <form id="loginForm">
            <input type="email"    id="loginEmail"    placeholder="Email"    required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="main-btn" id="loginBtn">LOGIN</button>
        </form>
        <button class="switch-btn" id="toSignup">Don't have an account? Sign up</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPA_URL = "https://ejqhkkweiduofqedihji.supabase.co";
    const SUPA_KEY = "sb_publishable_kt9rq_670vpNJMQaof9KhQ_sAChVKxH";
    const SERVICE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqcWhra3dlaWR1b2ZxZWRpaGppIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjY1OTU5MywiZXhwIjoyMDg4MjM1NTkzfQ.iHVe6w46ylHenrxYm1pVwMJbY_zSk_vX6oPHS3WrlkY";
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    // Stars
    const canvas = document.getElementById("stars"), ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const stars = Array.from({length:160},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.4+0.2,a:Math.random(),speed:Math.random()*0.005+0.002}));
    function drawStars(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.a+=s.speed;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,255,255,${0.3+0.5*Math.abs(Math.sin(s.a))})`;ctx.fill();});requestAnimationFrame(drawStars);}
    drawStars();

    window.onload = async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.href = "index.html";
    };

    document.getElementById("toLogin").addEventListener("click", () => {
        document.getElementById("signupBox").classList.remove("active");
        document.getElementById("loginBox").classList.add("active");
    });
    document.getElementById("toSignup").addEventListener("click", () => {
        document.getElementById("loginBox").classList.remove("active");
        document.getElementById("signupBox").classList.add("active");
    });

    function showMsg(id, text, type) { const el=document.getElementById(id); el.textContent=text; el.className="msg "+type; }

    // دالة تأكيد الإيميل تلقائياً باستخدام Admin API
    async function confirmEmail(userId) {
        try {
            const res = await fetch(`${SUPA_URL}/auth/v1/admin/users/${userId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": SERVICE_KEY,
                    "Authorization": `Bearer ${SERVICE_KEY}`
                },
                body: JSON.stringify({ email_confirm: true })
            });
            return res.ok;
        } catch(e) { return false; }
    }

    // Signup
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("signupBtn");
        btn.disabled = true; btn.textContent = "LOADING...";
        const email    = document.getElementById("gmail").value;
        const username = document.getElementById("newUsername").value;
        const password = document.getElementById("newPassword").value;

        try {
            // إنشاء الأكونت
            const { data, error } = await sb.auth.signUp({
                email, password,
                options: { data: { name: username } }
            });

            if (error) { showMsg("signupMsg", "❌ " + error.message, "error"); btn.disabled = false; btn.textContent = "CREATE ACCOUNT"; return; }

            // تأكيد الإيميل تلقائياً
            if (data.user) {
                await confirmEmail(data.user.id);
            }

            // Login مباشرة بعد التأكيد
            const { data: loginData, error: loginError } = await sb.auth.signInWithPassword({ email, password });
            if (!loginError && loginData.session) {
                localStorage.setItem("userName", username);
                showMsg("signupMsg", "✅ Account created! Redirecting...", "success");
                setTimeout(() => window.location.href = "index.html", 1200);
            } else {
                showMsg("signupMsg", "✅ Account created! Now login below.", "success");
                setTimeout(() => {
                    document.getElementById("signupBox").classList.remove("active");
                    document.getElementById("loginBox").classList.add("active");
                    document.getElementById("loginEmail").value = email;
                }, 1500);
            }
        } catch(err) { showMsg("signupMsg", "❌ " + err.message, "error"); }

        btn.disabled = false; btn.textContent = "CREATE ACCOUNT";
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("loginBtn");
        btn.disabled = true; btn.textContent = "LOADING...";
        const email    = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                let msg = error.message;
                if (msg.includes("Email not confirmed")) msg = "❌ Email not confirmed. Try signing up again.";
                else if (msg.includes("Invalid login credentials")) msg = "❌ Wrong email or password.";
                showMsg("loginMsg", msg, "error");
            } else {
                const name = data.user.user_metadata?.name || email;
                localStorage.setItem("userName", name);
                window.location.href = "index.html";
            }
        } catch(err) { showMsg("loginMsg", "❌ " + err.message, "error"); }
        btn.disabled = false; btn.textContent = "LOGIN";
    });
</script>
</body>
